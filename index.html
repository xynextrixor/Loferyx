<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="Wc35qtp9tFriQJg1zBqDY9L7gVEHvT120h6gQfLVRYw" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Loferyx</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        fetch('/health?err=' + encodeURIComponent(message + ' | ' + (error ? error.stack : '')));
      };
      window.addEventListener('unhandledrejection', function(event) {
        fetch('/health?err=' + encodeURIComponent('Unhandled Rejection: ' + event.reason));
      });
      const originalConsoleError = console.error;
      console.error = function(...args) {
        fetch('/health?err=' + encodeURIComponent('Console Error: ' + args.join(' ')));
        originalConsoleError.apply(console, args);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
