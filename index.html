    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Retro Machines Gala",
      "url": "https://loferyx.onrender.com",
      "description": "Free online code compiler with real-time collaboration and an AI coding assistant. Supports Python, JS, Java, C++, and C#.",
      "applicationCategory": "DeveloperApplication",
      "genre": "Code Editor",
      "operatingSystem": "WebBrowser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      let isFetchingHealth = false;
      window.onerror = function(message, source, lineno, colno, error) {
        if (isFetchingHealth) return;
        isFetchingHealth = true;
        fetch('/health?err=' + encodeURIComponent(message + ' | ' + (error ? error.stack : '')))
          .catch(() => {})
          .finally(() => isFetchingHealth = false);
      };
      window.addEventListener('unhandledrejection', function(event) {
        let reasonStr = String(event.reason);
        if (reasonStr.includes('Failed to fetch')) return; // Ignore standard network errors to prevent loops
        if (isFetchingHealth) return;
        isFetchingHealth = true;
        fetch('/health?err=' + encodeURIComponent('Unhandled Rejection: ' + reasonStr))
          .catch(() => {})
          .finally(() => isFetchingHealth = false);
      });
      const originalConsoleError = console.error;
      console.error = function(...args) {
        let errStr = args.join(' ');
        if (errStr.includes('Failed to fetch') || errStr.includes('failed to connect to websocket')) {
           return originalConsoleError.apply(console, args);
        }
        if (isFetchingHealth) return originalConsoleError.apply(console, args);
        isFetchingHealth = true;
        fetch('/health?err=' + encodeURIComponent('Console Error: ' + errStr))
          .catch(() => {})
          .finally(() => isFetchingHealth = false);
        originalConsoleError.apply(console, args);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
